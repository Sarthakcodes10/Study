<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIT Bhopal · Mid-Term Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --text: #e8e8f0;
    --muted: #7070a0;
    --accent1: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --accent5: #4facfe;
    --accent6: #ff9a9e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(108,99,255,0.08) 0%, transparent 100%);
  }

  .header-tag {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent1);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8e8f0 30%, var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--muted);
    max-width: 560px;
    line-height: 1.6;
  }

  /* GLOBAL PROGRESS */
  .global-bar-wrapper {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .global-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    max-width: 400px;
  }

  .global-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent1), var(--accent3));
    width: 0%;
    transition: width 0.6s ease;
  }

  .global-label { font-size: 12px; color: var(--muted); }
  .global-count { font-size: 12px; color: var(--accent3); font-weight: 500; }

  /* NAV TABS */
  nav {
    position: relative;
    z-index: 1;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent-color, var(--accent1));
  }

  .tab-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* CONTENT */
  .content {
    position: relative;
    z-index: 1;
    padding: 32px 40px 80px;
    max-width: 1100px;
  }

  .course-panel { display: none; }
  .course-panel.active { display: block; }

  /* COURSE HEADER */
  .course-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-left: 4px solid var(--accent-color, var(--accent1));
  }

  .course-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--accent-color, var(--accent1));
    white-space: nowrap;
    text-align: center;
    line-height: 1.6;
  }

  .course-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .course-meta {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }

  .course-meta span {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 6px;
  }

  /* MODULE SECTIONS */
  .module-section {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .module-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--card);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .module-header:hover { background: #1e1e2e; }

  .module-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .module-number {
    font-size: 11px;
    color: var(--accent-color, var(--accent1));
    background: rgba(108,99,255,0.1);
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--accent-color, var(--accent1));
    white-space: nowrap;
  }

  .module-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
  }

  .half-tag {
    font-size: 10px;
    background: rgba(255, 165, 0, 0.15);
    color: var(--accent4);
    border: 1px solid var(--accent4);
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .module-progress-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .pill-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .pill-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent-color, var(--accent1));
    transition: width 0.4s ease;
  }

  .chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    margin-left: 12px;
  }

  .module-section.open .chevron { transform: rotate(180deg); }

  /* TOPIC LIST */
  .topic-list {
    display: none;
    padding: 0 20px 16px;
    background: var(--surface);
  }

  .module-section.open .topic-list { display: block; }

  .topic-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: all 0.15s;
  }

  .topic-item:last-child { border-bottom: none; }
  .topic-item:hover .topic-text { color: var(--text); }

  .topic-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 10px;
  }

  .topic-item.checked .topic-checkbox {
    background: var(--accent-color, var(--accent1));
    border-color: var(--accent-color, var(--accent1));
    color: white;
  }

  .topic-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    transition: color 0.15s;
  }

  .topic-item.checked .topic-text {
    color: var(--muted);
    text-decoration: line-through;
  }

  /* KEY CONCEPTS */
  .concepts-box {
    margin-top: 12px;
    padding: 14px 16px;
    background: rgba(108,99,255,0.05);
    border: 1px solid rgba(108,99,255,0.15);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
  }

  .concepts-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 8px;
  }

  .concept-chip {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    margin: 2px 3px 2px 0;
    color: var(--text);
  }

  /* EXAM TIPS */
  .exam-tip {
    margin-top: 24px;
    padding: 16px 20px;
    background: rgba(255, 101, 132, 0.06);
    border: 1px solid rgba(255,101,132,0.2);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--muted);
  }

  .exam-tip-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    header, nav, .content { padding-left: 20px; padding-right: 20px; }
    .course-header { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">▸ VIT Bhopal · Mid-Term Prep</div>
  <h1>Study Hub</h1>
  <p class="header-sub">Your interactive learning dashboard. Each course covers the first 2.5 modules tested in mid-terms. Check off topics as you study.</p>
  <div class="global-bar-wrapper">
    <div class="global-bar-track">
      <div class="global-bar-fill" id="globalFill"></div>
    </div>
    <span class="global-label">Overall Progress:</span>
    <span class="global-count" id="globalCount">0 / 0 topics</span>
  </div>
</header>

<nav id="tabNav">
  <!-- tabs injected by JS -->
</nav>

<div class="content" id="mainContent">
  <!-- panels injected by JS -->
</div>

<script>
const COURSES = [
  {
    code: "CSA3006",
    name: "Data Mining & Data Warehousing",
    color: "#6c63ff",
    credits: 4,
    prereq: "DBMS, Machine Learning",
    modules: [
      {
        id: "dmdw-co1",
        label: "CO1",
        title: "Data Warehouse Fundamentals",
        half: false,
        topics: [
          "Basic concepts of Data Warehousing",
          "OLTP vs Data Warehouses — key differences",
          "Multitiered Architecture of Data Warehouses",
          "Data Warehouse Models overview",
          "ETL — Extraction, Transformation & Loading",
          "Metadata Repository",
          "Data Cube & OLAP operations",
          "Data Warehouse Design & Usage",
          "Data Warehouse Implementation",
          "Knowledge Discovery in Databases (KDD) — intro",
          "Main data mining tasks & KDD process steps",
          "Architecture of a data mining system",
          "Data mining on different kinds of data",
          "KEEL tool overview",
          "Data categories and attribute types"
        ],
        concepts: ["ETL Pipeline","Star Schema","OLAP","Data Cube","Snowflake Schema","KDD","KEEL"],
        tip: "Mid-terms love ETL vs OLTP comparisons and star schema diagrams. Know the 3-tier warehouse architecture cold."
      },
      {
        id: "dmdw-co2",
        label: "CO2",
        title: "Data Preprocessing & Association Rules",
        half: false,
        topics: [
          "Data objects and attribute types",
          "Basic statistical description of data (mean, median, mode)",

          "Measuring data similarity and dissimilarity",
          "Data cleaning strategies",
          "Data integration techniques",
          "Data reduction techniques",
          "Data transformation and discretization",
          "Association Rule Mining — basic concepts",
          "Frequent itemset mining methods",
          "Apriori algorithm — steps and complexity",
          "Pattern growth approach (FP-Growth)",
          "Mining with vertical data format",
          "Closed and max patterns",
          "Multilevel and multidimensional pattern mining"
        ],
        concepts: ["Support","Confidence","Lift","Apriori","FP-Growth","Min-Max Normalization","Z-score"],
        tip: "Apriori algorithm steps are almost always in mid-terms. Practice the candidate generation and pruning steps on a small dataset."
      },
      {
        id: "dmdw-co3-half",
        label: "CO3 (½)",
        title: "Classification — Basics",
        half: true,
        topics: [
          "Basic concepts of Classification",
          "Decision Tree Induction — ID3 / C4.5 algorithms",
          "Information Gain and Entropy calculation",
          "Bayesian Classification — Naïve Bayes",
          "Rule-based classification overview",
          "Support Vector Machines (SVM) — intuition",
          "Hyperplane and margin in SVM"
        ],
        concepts: ["Entropy","Information Gain","Gini Index","Naïve Bayes","SVM","Hyperplane"],
        tip: "For 2.5 modules, Classification likely only covers up to SVM intro. Focus on Decision Trees and Naïve Bayes calculation problems."
      }
    ]
  },
  {
    code: "CSA3007",
    name: "Deep Learning",
    color: "#ff6584",
    credits: 4,
    prereq: "Machine Learning",
    modules: [
      {
        id: "dl-co1",

          "Historical trends in Deep Learning",

          "Matrix operations: norms, transpose, inverse",
          "Eigendecomposition and eigenvectors",
          "Probability: Random variables, distributions",
          "Bayes' Rule and its applications",
          "Information Theory basics (entropy, KL-divergence)",
          "Structured probabilistic models",
          "Numerical computation: overflow & underflow",
          "Gradient-based optimization",
          "Constrained optimization",
          "Capacity, overfitting, underfitting",
          "Bayesian Classification",
          "Supervised vs unsupervised learning recap",
          "Building a machine learning algorithm"
        ],
        concepts: ["Gradient Descent","Eigenvector","Bayes Rule","Entropy","Overfitting","Regularization"],
        tip: "Linear algebra and probability questions are very common. Know Bayes Rule derivations and gradient descent update rule."
      },
      {
        id: "dl-co2",
        label: "CO2",
        title: "Fundamental Deep Learning Methods",
        half: false,
        topics: [
          "Artificial Neural Networks (ANN) — architecture",
          "Perceptron model and learning laws",
          "Layers: input, hidden, output",
          "Backpropagation algorithm — steps",
          "Parallel and Distributed Processing (PDP) overview",
          "Linear associative models and stochastic networks",
          "CNN: Convolution operation explained",
          "CNN: Filters, pooling (max/avg), stride, dropout",
          "CNN: Layers and typical architectures",
          "CNN: Applications overview",
          "RNN: Unfolding in time",
          "Backpropagation Through Time (BPTT)",
          "LSTM models — gates explained",
          "Bidirectional RNNs",
          "Encoder-decoder and attention models"
        ],
        concepts: ["Backprop","Convolution","Pooling","LSTM","Vanishing Gradient","Attention","Dropout"],
        tip: "Draw the backpropagation flow and CNN architecture from scratch for practice. LSTM gate equations are frequently tested."
      },
      {
        id: "dl-co3-half",
        label: "CO3 (½)",
        title: "Advanced Methods — Intro",
        half: true,
        topics: [
          "Variational Autoencoder (VAE) — concept",
          "Deep Autoencoder (DAE) — architecture",
          "Encoder-decoder structure in autoencoders",
          "Generative Adversarial Network (GAN) — concept"
        ],
        concepts: ["VAE","DAE","GAN","Latent Space","Generator","Discriminator"],
        tip: "For 2.5 modules, you'd likely cover VAE and intro to GAN. Understand the encoder-decoder principle and what the latent space represents."
      }
    ]
  },
  {
    code: "CSA4029",
    name: "Reinforcement & Representation Learning",
    color: "#43e97b",
    credits: 4,
    prereq: "Deep Learning, MDP, Graph Theory",
    modules: [
      {
        id: "rrl-co1",
        label: "CO1",
        title: "Reinforcement Learning Overview",
        half: false,
        topics: [
          "Origin and history of Reinforcement Learning",
          "RL connections with other ML branches",
          "Reinforcement Learning Problem definition",
          "Elements of RL: agent, environment, reward, state, action",
          "Limitations and scope of RL",
          "Extended Example: Tic-Tac-Toe RL",

          "Introduction to Markov Decision Process (MDP)",
          "State value function V(s)",
          "Action value function Q(s,a)",
          "Bellman Expectation Equations",
          "Optimality of value functions",
          "Bellman Optimality Equations",
          "Policy evaluation and improvement",
          "Policy gradient methods",
          "Reducing variance in policy gradient estimates",
          "REINFORCE algorithm overview",
          "Discount factor γ — meaning and effect",
          "Finite vs infinite horizon problems"
        ],
        concepts: ["MDP","Bellman Equation","V(s)","Q(s,a)","Policy Gradient","Discount Factor","REINFORCE"],
        tip: "Bellman equations are core exam material. Practice deriving the Bellman expectation equation and computing V(s) for small MDPs by hand."
      },
      {
        id: "rrl-co3-half",
        label: "CO3 (½)",
        title: "RL Algorithms — Intro",
        half: true,
        topics: [
          "Algorithms for control learning overview",

      },
      {
        id: "cv-m2",

  {
    code: "PLA1006",

        half: false,

          "Division of wages"
        ],
        concepts: ["LCM","HCF","SI/CI","Percentage","Profit-Loss","Divisibility Rules","Weighted Average"],
        tip: "Pipes & Cistern and Profit-Loss are high-frequency topics. Speed matters here — practice mental math shortcuts."
      },
      {
        id: "lt-m2",
        label: "M2",
        title: "Data Interpretation & Verbal",
        half: false,
        topics: [
          "DI — Single charts (bar, pie, line)",
          "DI — Multiple charts interpretation",
          "Data Sufficiency problems",
          "Ratios and proportion",
          "Data Arrangements (seating, circular)",
          "Synonyms & Antonyms",
          "Problems on Ages",
          "Analogies & Spell Check",
          "Homophones, Homonyms and Heteronyms"
        ],
        concepts: ["Ratio","Proportion","Data Sufficiency","Age Problems","Analogy","DI Charts"],
        tip: "Data Sufficiency questions need practice — the trick is to evaluate each statement independently first, then together."
      },
      {
        id: "lt-m3-half",
        label: "M3 (½)",
        title: "Efficiency & Time Problems",
        half: true,
        topics: [
          "Working with different efficiencies",
          "Pipes and Cisterns (advanced)",
          "Mixtures and Allegation method",
          "Work equivalence / Man-days concept"
        ],
        concepts: ["Alligation","Man-Days","Work Equivalence","Efficiency Ratio"],
        tip: "Alligation is a go-to technique for mixture problems and even some average problems. Master the cross-diagram method."
      }
    ]
  }
];

// STATE
let checked = JSON.parse(localStorage.getItem('midterm_checked') || '{}');

function save() {
  localStorage.setItem('midterm_checked', JSON.stringify(checked));
}

function buildTabs() {
  const nav = document.getElementById('tabNav');
  COURSES.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.style.setProperty('--accent-color', c.color);
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="tab-dot" style="background:${c.color}"></span>${c.code}`;
    btn.addEventListener('click', () => switchTab(i));
    nav.appendChild(btn);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.course-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function buildPanels() {
  const container = document.getElementById('mainContent');
  COURSES.forEach((c, ci) => {
    const panel = document.createElement('div');
    panel.className = 'course-panel' + (ci===0?' active':'');
    panel.style.setProperty('--accent-color', c.color);

    // header
    panel.innerHTML = `
      <div class="course-header" style="border-left-color:${c.color}">
        <div class="course-badge" style="color:${c.color};border-color:${c.color}20">
          ${c.code}<br/>${c.credits} Credits
        </div>
        <div class="course-info">
          <h2>${c.name}</h2>
          <div class="course-meta">
            <span>Pre-req: ${c.prereq}</span>
            <span>Mid-term: CO1 → CO2 → ½ CO3</span>
          </div>
        </div>
      </div>
    `;

    // modules
    c.modules.forEach(mod => {
      const total = mod.topics.length;
      const done = mod.topics.filter((_,ti) => checked[`${mod.id}_${ti}`]).length;
      const pct = total ? Math.round(done/total*100) : 0;

      const sec = document.createElement('div');
      sec.className = 'module-section';
      sec.innerHTML = `
        <div class="module-header">
          <div class="module-title-row">
            <span class="module-number" style="color:${c.color};background:${c.color}18;border-color:${c.color}40">${mod.label}</span>
            <span class="module-name">${mod.title}</span>
            ${mod.half ? `<span class="half-tag">½ MODULE</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="module-progress-pill">
              <div class="pill-bar"><div class="pill-fill" style="width:${pct}%;background:${c.color}" data-fill="${mod.id}"></div></div>
              <span data-label="${mod.id}">${done}/${total}</span>
            </div>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="topic-list">
          ${mod.topics.map((t,ti) => `
            <div class="topic-item${checked[`${mod.id}_${ti}`]?' checked':''}" data-mod="${mod.id}" data-ti="${ti}">
              <div class="topic-checkbox">${checked[`${mod.id}_${ti}`]?'✓':''}</div>
              <span class="topic-text">${t}</span>
            </div>
          `).join('')}
          <div class="concepts-box">
            <div class="concepts-label">⚡ Key Concepts</div>
            ${mod.concepts.map(k=>`<span class="concept-chip">${k}</span>`).join('')}
          </div>
          <div class="exam-tip">
            <div class="exam-tip-label">🎯 Exam Focus</div>
            ${mod.tip}
          </div>
        </div>
      `;

      // toggle open/close
      sec.querySelector('.module-header').addEventListener('click', () => {
        sec.classList.toggle('open');
      });

      // checkbox clicks
      sec.querySelectorAll('.topic-item').forEach(item => {
        item.addEventListener('click', () => {
          const key = `${item.dataset.mod}_${item.dataset.ti}`;
          checked[key] = !checked[key];
          item.classList.toggle('checked', checked[key]);
          item.querySelector('.topic-checkbox').textContent = checked[key] ? '✓' : '';
          save();
          updateProgress(item.dataset.mod, c, mod);
          updateGlobal();
        });
      });

      panel.appendChild(sec);
    });

    // exam tip global
    container.appendChild(panel);
  });
}

function updateProgress(modId, course, mod) {
  const total = mod.topics.length;
  const done = mod.topics.filter((_,ti) => checked[`${modId}_${ti}`]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const fill = document.querySelector(`[data-fill="${modId}"]`);
  const label = document.querySelector(`[data-label="${modId}"]`);
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = `${done}/${total}`;
}

function updateGlobal() {
  let total = 0, done = 0;
  COURSES.forEach(c => c.modules.forEach(m => {
    total += m.topics.length;
    done += m.topics.filter((_,ti) => checked[`${m.id}_${ti}`]).length;
  }));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('globalFill').style.width = pct + '%';
  document.getElementById('globalCount').textContent = `${done} / ${total} topics`;
}

buildTabs();
buildPanels();
updateGlobal();
</script>
</body>

</html>
